<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>
<style>
/* --- Global --- */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #f4f6f9;
  color: #333;
}

/* --- Header --- */
header {
  background: #1e2a38;
  color: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 8%;
}

.logo {
  font-size: 20px;
  font-weight: bold;
}

nav a {
  color: white;
  text-decoration: none;
  margin-left: 20px;
  font-weight: 500;
  transition: 0.3s;
}

nav a:hover,
nav a.active {
  color: #00bcd4;
}

/* --- Section --- */
.section {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 90vh;
  padding: 20px;
}

.container {
  background: white;
  padding: 40px;
  border-radius: 8px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
  width: 100%;
  max-width: 500px;
}

h2 {
  text-align: center;
  margin-bottom: 25px;
}

/* --- Form --- */
.form-group {
  margin-bottom: 18px;
}

input,
textarea {
  width: 100%;
  padding: 12px;
  border: 1px solid #ccc;
  border-radius: 6px;
  font-size: 14px;
  transition: 0.3s;
}

input:focus,
textarea:focus {
  border-color: #00bcd4;
  outline: none;
}

.error {
  color: red;
  font-size: 12px;
  height: 14px;
  display: block;
  margin-top: 4px;
}

/* --- Button --- */
.btn {
  width: 100%;
  padding: 12px;
  background: #00bcd4;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 15px;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  background: #0097a7;
}

/* --- Success Message --- */
.success-message {
  display: none;
  background-color: #d4edda;
  color: #155724;
  border: 1px solid #c3e6cb;
  padding: 15px;
  border-radius: 6px;
  text-align: center;
  margin-bottom: 20px;
  opacity: 0;
  transform: translateY(-20px);
  transition: opacity 0.5s ease, transform 0.5s ease;
}

.success-message.show {
  display: block;
  opacity: 1;
  transform: translateY(0);
}

/* --- Responsive --- */
@media (max-width: 768px) {
  header {
    flex-direction: column;
    gap: 10px;
  }

  nav a {
    margin: 0 10px;
  }

  .container {
    padding: 25px;
  }
}
</style>
</head>
<body>

<header>
  <div class="Logo.png">SCT</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="contact.html" class="active">Contact</a>
  </nav>
</header>

<section class="section">
  <div class="container">
    <h2>Contact Us</h2>

    <div class="success-message" id="successMessage">Your message has been sent successfully!</div>

    <form id="contactForm" action="sendmail.php" method="POST">
      <div class="form-group">
        <input type="text" id="name" name="name" placeholder="Your Name">
        <small class="error"></small>
      </div>

      <div class="form-group">
        <input type="email" id="email" name="email" placeholder="Your Email">
        <small class="error"></small>
      </div>

      <div class="form-group">
        <textarea id="message" name="message" placeholder="Your Message" rows="5"></textarea>
        <small class="error"></small>
      </div>

      <button type="submit" class="btn">Send Message</button>
    </form>
  </div>
</section>

<script>
const form = document.getElementById("contactForm");
const nameInput = document.getElementById("name");
const emailInput = document.getElementById("email");
const messageInput = document.getElementById("message");
const successMessage = document.getElementById("successMessage");

form.addEventListener("submit", function(e) {
  e.preventDefault(); // prevent default submission
  let isValid = true;

  // Clear previous errors
  document.querySelectorAll(".error").forEach(el => el.textContent = "");

  // Name validation
  if (nameInput.value.trim() === "") {
    showError(nameInput, "Name is required");
    isValid = false;
  }

  // Email validation
  if (emailInput.value.trim() === "") {
    showError(emailInput, "Email is required");
    isValid = false;
  } else if (!validateEmail(emailInput.value)) {
    showError(emailInput, "Enter a valid email");
    isValid = false;
  }

  // Message validation
  if (messageInput.value.trim() === "") {
    showError(messageInput, "Message cannot be empty");
    isValid = false;
  }

  if (isValid) {
    // Show success message
    successMessage.classList.add("show");

    // Clear form
    form.reset();

    // Hide message after 3 seconds
    setTimeout(() => {
      successMessage.classList.remove("show");
    }, 3000);

    // Optional: uncomment to submit to server
    // form.submit();
  }
});

function showError(input, message) {
  const formGroup = input.parentElement;
  const error = formGroup.querySelector(".error");
  error.textContent = message;
}

function validateEmail(email) {
  const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  return re.test(email.toLowerCase());
}
</script>

</body>
</html>
